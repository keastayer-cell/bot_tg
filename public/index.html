<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Угадай кто</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            font-family: 'Arial', sans-serif;
            padding: 20px;
        }

        .image-container {
            max-width: 400px;
            width: 100%;
            margin-bottom: 30px;
        }

        .image-container img {
            width: 100%;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }

        .question {
            color: white;
            font-size: 24px;
            margin-bottom: 20px;
            text-align: center;
        }

        .input-container {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .answer-input {
            padding: 15px 20px;
            font-size: 18px;
            border: none;
            border-radius: 10px;
            width: 250px;
            outline: none;
        }

        .submit-btn {
            padding: 15px 30px;
            font-size: 18px;
            background: #e94560;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
        }

        .submit-btn:hover {
            background: #ff6b6b;
            transform: scale(1.05);
        }

        .result {
            margin-top: 25px;
            font-size: 22px;
            font-weight: bold;
            text-align: center;
            min-height: 30px;
        }

        .result.correct {
            color: #4ecca3;
        }

        /* Popup */
        .popup {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .popup.show {
            display: flex;
        }

        .popup-content {
            background: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            max-width: 400px;
        }

        .popup-text {
            font-size: 24px;
            color: #333;
            margin-bottom: 20px;
        }

        .popup-btn {
            padding: 12px 30px;
            font-size: 18px;
            background: #e94560;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="image-container">
        <img src="petuh.jpg" alt="Загадочное фото">
    </div>

    <div class="question">Кто изображен на рисунке?</div>

    <div class="input-container">
        <input type="text" class="answer-input" id="answerInput" placeholder="Введите ответ">
        <button class="submit-btn" id="submitBtn">Ответить</button>
    </div>

    <div class="result" id="result"></div>

    <!-- Popup -->
    <div class="popup" id="popup">
        <div class="popup-content">
            <div class="popup-text">Нет, думайте ещё...</div>
            <button class="popup-btn" id="popupBtn">Ок</button>
        </div>
    </div>

    <script>
        const answerInput = document.getElementById('answerInput');
        const submitBtn = document.getElementById('submitBtn');
        const result = document.getElementById('result');
        const popup = document.getElementById('popup');
        const popupBtn = document.getElementById('popupBtn');

        let attempts = 0;
        const correctAnswer = 'гас';

        function checkAnswer() {
            const userAnswer = answerInput.value.trim().toLowerCase();

            if (!userAnswer) {
                return;
            }

            if (userAnswer === correctAnswer) {
                attempts++;
                result.classList.add('correct');
                if (attempts === 1) {
                    result.textContent = 'С первого раза, а ты хорош!';
                } else {
                    result.textContent = 'Верно, молодец!';
                }
                answerInput.disabled = true;
                submitBtn.disabled = true;
            } else {
                attempts++;
                popup.classList.add('show');
                answerInput.value = '';
                answerInput.focus();
            }
        }

        submitBtn.addEventListener('click', checkAnswer);

        answerInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                checkAnswer();
            }
        });

        popupBtn.addEventListener('click', () => {
            popup.classList.remove('show');
        });

        // Закрытие popup по клику вне окна
        popup.addEventListener('click', (e) => {
            if (e.target === popup) {
                popup.classList.remove('show');
            }
        });
    </script>
</body>
</html>
