server.port=${PORT:8080}

# Timezone
USER_TIMEZONE=Europe/Moscow

# Railway public URL for webhook
railway.public-url=${RAILWAY_PUBLIC_URL:}

bot.token=${BOT_TOKEN}
bot.username=${BOT_USERNAME}

# Database
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.datasource.url=${DATABASE_URL:jdbc:h2:file:./data/h2db;AUTO_SERVER=TRUE;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
admin-chat-id=${ADMIN_CHAT_ID}

# Scheduler interval in milliseconds (default 60000 = 1 minute)
bot.scheduler.interval=${SCHEDULER_INTERVAL:60000}

# Logging - only our bot logs, not Telegram library
logging.level.root=WARN
logging.level.org.telegram=WARN
logging.level.com.example.bot=INFO
logging.file.name=bot.log

